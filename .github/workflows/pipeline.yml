# ============================================================
# Consolidated CI/CD Pipeline
# Combines Lint, Test, Type Check, Build, and Deploy into
# a single, unified pipeline with zero redundant steps.
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  # Fake environment variables for build validation in CI
  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'ci-placeholder' }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'ci-placeholder.firebaseapp.com' }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'ci-placeholder' }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || 'ci-placeholder.appspot.com' }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '000000000000' }}
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '1:000000000000:web:ci' }}
  VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY || 'ci-placeholder' }}

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Build, Lint, Test, and Verify
  # ──────────────────────────────────────────────────────────
  build-and-test:
    name: 🧪 CI (Lint, Test, Build, Typecheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run ESLint
        # Tolerant warning threshold (150) to prevent legacy warning blockages
        run: npm run lint -- --max-warnings 150

      - name: Run TypeScript check
        run: npx tsc --noEmit --skipLibCheck

      - name: Run tests with coverage
        run: npm run test:coverage -- --reporter=verbose --reporter=github-actions
        env:
          CI: true

      - name: Build application
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f dist/index.html ]; then
            echo "::error::Build output verification failed. dist/index.html not found."
            exit 1
          fi
          echo "Production build verified successfully!"
          du -sh dist/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # Job 2: Conditional Deploy
  # Runs only on push to main or develop after CI succeeds
  # ──────────────────────────────────────────────────────────
  deploy:
    name: 🚀 CD (Deploy to Vercel)
    runs-on: ubuntu-latest
    needs: build-and-test
    # Deploy only on pushes/merges to main or develop, OR manual trigger
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-build
          path: dist

      - name: Determine Environment
        id: env-check
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "vercel_env=production" >> $GITHUB_OUTPUT
            echo "prod_flag=--prod" >> $GITHUB_OUTPUT
          else
            echo "vercel_env=preview" >> $GITHUB_OUTPUT
            echo "prod_flag=" >> $GITHUB_OUTPUT
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Project Info
        run: vercel pull --yes --environment=${{ steps.env-check.outputs.vercel_env }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: vercel-deploy
        run: |
          URL=$(vercel deploy --prebuilt ${{ steps.env-check.outputs.prod_flag }} --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "deployment_url=$URL" >> $GITHUB_OUTPUT
          echo "::notice title=Deployment URL::$URL"
