# ============================================================
# CD — Continuous Deployment
# Deploy to Vercel (preview on PRs, production on main)
# Runs only after CI passes.
# ============================================================

name: CD – Deploy

on:
  # Trigger on CI completion rather than raw push,
  # so deploy only runs when lint + test + build all pass.
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main, develop]

  # Allow manual one-click deploy from Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # Don't cancel in-flight deploys

jobs:
  # ──────────────────────────────────────────────────────────
  # Guard: only proceed if CI succeeded
  # ──────────────────────────────────────────────────────────
  guard:
    name: ✅ CI Gate
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      environment: ${{ steps.check.outputs.environment }}
    steps:
      - name: Determine deploy target
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ] || \
               [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            ENV="production"
          else
            ENV="preview"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "should_deploy=true" >> $GITHUB_OUTPUT
          echo "::notice title=Deploy Target::Deploying to $ENV"

  # ──────────────────────────────────────────────────────────
  # Deploy to Vercel
  # ──────────────────────────────────────────────────────────
  deploy-vercel:
    name: 🚀 Deploy → Vercel (${{ needs.guard.outputs.environment }})
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.should_deploy == 'true'
    environment:
      name: ${{ needs.guard.outputs.environment }}
      url: ${{ steps.deploy.outputs.deployment_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build for production
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ needs.guard.outputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [ "${{ needs.guard.outputs.environment }}" = "production" ]; then
            URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          else
            URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          fi
          echo "deployment_url=$URL" >> $GITHUB_OUTPUT
          echo "::notice title=Deployed::$URL"

      - name: Comment deploy URL on PR
        if: github.event.workflow_run.event == 'pull_request' || github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment_url }}';
            const env = '${{ needs.guard.outputs.environment }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview Deployment Ready\n\n| | |\n|---|---|\n| **Environment** | ${env} |\n| **URL** | [${url}](${url}) |\n| **Commit** | \`${context.sha.slice(0,7)}\` |\n\n_Deployed via GitHub Actions CI/CD_`
            });
