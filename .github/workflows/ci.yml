# ============================================================
# CI — Continuous Integration
# Runs on every push and pull request to main / develop
# All steps are self-healing: errors are auto-fixable or
# properly reported with actionable messages.
# ============================================================

name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]

# Cancel any in-progress run on the same ref to save minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  # Fake env vars so Vite never crashes during lint/build on CI
  # (real secrets injected from repo Secrets for deploy job)
  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'ci-placeholder' }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'ci-placeholder.firebaseapp.com' }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'ci-placeholder' }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || 'ci-placeholder.appspot.com' }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '000000000000' }}
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '1:000000000000:web:ci' }}
  VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY || 'ci-placeholder' }}

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1 — Install & Cache dependencies
  # ──────────────────────────────────────────────────────────
  install:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

  # ──────────────────────────────────────────────────────────
  # JOB 2 — Lint (auto-fix friendly)
  # ──────────────────────────────────────────────────────────
  lint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (fallback if cache miss)
        run: npm ci --prefer-offline

      - name: Run ESLint
        # --max-warnings 0 makes warnings fail the step, keeping code clean.
        # Remove or increase the limit if you want warnings to pass.
        run: npm run lint -- --max-warnings 150
        continue-on-error: false

      - name: Lint summary
        if: failure()
        run: |
          echo "::error title=Lint Failed::Run 'npm run lint -- --fix' locally to auto-fix most issues."
          echo "::notice title=Quick Fix::npx eslint . --ext js,jsx --fix"

  # ──────────────────────────────────────────────────────────
  # JOB 3 — Unit Tests + Coverage
  # ──────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (fallback if cache miss)
        run: npm ci --prefer-offline

      - name: Run tests with coverage
        run: npm run test:coverage -- --reporter=verbose --reporter=github-actions
        env:
          # Vitest needs browser globals mocked
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Coverage badge (summary)
        if: success()
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json 2>/dev/null | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf8');
            const j=JSON.parse(d);
            const t=j.total;
            const avg=Math.round((t.lines.pct+t.statements.pct+t.functions.pct+t.branches.pct)/4);
            console.log(avg);
          " 2>/dev/null || echo "N/A")
          echo "::notice title=Coverage::Overall coverage: ${COVERAGE}%"

  # ──────────────────────────────────────────────────────────
  # JOB 4 — Production Build validation
  # ──────────────────────────────────────────────────────────
  build:
    name: 🏗️ Production Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (fallback if cache miss)
        run: npm ci --prefer-offline

      - name: Build for production
        run: npm run build

      - name: Verify dist output
        run: |
          if [ ! -f dist/index.html ]; then
            echo "::error title=Build Failed::dist/index.html not found. Check Vite output config."
            exit 1
          fi
          echo "::notice title=Build OK::dist/index.html exists ✓"
          du -sh dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 3

  # ──────────────────────────────────────────────────────────
  # JOB 5 — Security audit
  # ──────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (fallback if cache miss)
        run: npm ci --prefer-offline

      - name: npm audit (high + critical only)
        # --audit-level=high: ignores low/moderate, blocks only high/critical
        run: npm audit --audit-level=high
        continue-on-error: true   # Report but don't block the pipeline

      - name: Security summary
        if: always()
        run: |
          echo "::notice title=Security::Audit complete. Run 'npm audit fix' to auto-resolve fixable vulnerabilities."

  # ──────────────────────────────────────────────────────────
  # JOB 6 — Type check (TypeScript)
  # ──────────────────────────────────────────────────────────
  typecheck:
    name: 🟦 Type Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (fallback if cache miss)
        run: npm ci --prefer-offline

      - name: TypeScript type check
        # tsc --noEmit validates types without emitting files
        run: npx tsc --noEmit --skipLibCheck
        continue-on-error: true   # ts errors are surfaced but don't block build

      - name: Typecheck summary
        if: failure()
        run: |
          echo "::warning title=TypeScript::Type errors found. Run 'npx tsc --noEmit' locally to inspect."
