# ============================================================
# PR Quality Gate
# Lightweight checks that run fast on every pull request.
# Keeps feedback loop tight for developers.
# ============================================================

name: PR Check

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────
  # PR title must follow Conventional Commits
  # ──────────────────────────────────────────────────────────
  pr-title:
    name: 📝 PR Title Format
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            PR title must start with a lowercase letter.
            Example: "feat: add carbon tracking dashboard"

  # ──────────────────────────────────────────────────────────
  # Quick lint + build smoke test
  # ──────────────────────────────────────────────────────────
  quick-check:
    name: ⚡ Quick Smoke Test
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: ci-placeholder
      VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: ci-placeholder
      VITE_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
      VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
      VITE_FIREBASE_APP_ID: '1:000000000000:web:ci'
      VITE_GEMINI_API_KEY: ci-placeholder
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: ESLint check
        run: npm run lint -- --max-warnings 50

      - name: Build check
        run: npm run build

      - name: Verify output
        run: |
          [ -f dist/index.html ] && echo "✓ Build output OK" || (echo "::error::dist/index.html missing" && exit 1)

  # ──────────────────────────────────────────────────────────
  # Size report — tracks bundle size growth
  # ──────────────────────────────────────────────────────────
  bundle-size:
    name: 📦 Bundle Size Report
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: ci-placeholder
      VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: ci-placeholder
      VITE_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
      VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
      VITE_FIREBASE_APP_ID: '1:000000000000:web:ci'
      VITE_GEMINI_API_KEY: ci-placeholder
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build and report size
        run: |
          npm run build
          echo "## 📦 Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh dist/assets/*.js 2>/dev/null | sort -h >> $GITHUB_STEP_SUMMARY || echo "No JS chunks found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total dist size:** $(du -sh dist/ | cut -f1)" >> $GITHUB_STEP_SUMMARY
