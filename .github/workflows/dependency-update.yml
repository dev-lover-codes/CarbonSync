# ============================================================
# Dependency Update Automation
# Runs weekly — auto-creates PRs for dependency updates
# so you always stay patched without manual work.
# ============================================================

name: Dependency Auto-Update

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-deps:
    name: 🔄 Auto-update npm Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm-check-updates
        run: npm install -g npm-check-updates

      - name: Check for updates (minor + patch only — safe)
        run: ncu --target minor --upgrade

      - name: Install updated packages
        run: npm install

      - name: Verify build still works
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ci-placeholder
          VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-placeholder
          VITE_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: '1:000000000000:web:ci'
          VITE_GEMINI_API_KEY: ci-placeholder

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): update npm dependencies (minor/patch)'
          branch: 'chore/dependency-updates'
          delete-branch: true
          title: 'chore(deps): weekly dependency updates'
          body: |
            ## 🔄 Automated Dependency Updates

            This PR was automatically created by the weekly dependency update workflow.

            ### What changed
            - Updated all `minor` and `patch` version bumps (safe upgrades)
            - Verified the production build still compiles correctly

            ### Review Checklist
            - [ ] Check for any breaking API changes in the CHANGELOG
            - [ ] Verify tests pass in CI
            - [ ] Merge if CI is green ✅

            > ⚠️ Major version bumps are excluded. Update those manually.
          labels: 'dependencies,automated'
          draft: false
